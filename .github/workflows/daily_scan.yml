name: Daily Reputation Scan

on:
  schedule:
    # Runs at 12:00 UTC = 8:00am Eastern Time (Mon-Fri)
    # To change the time, edit the numbers: '0 12 * * 1-5'
    # Format is: minute hour * * days  (1=Mon, 5=Fri)
    - cron: '0 12 * * 1-5'
  # This lets you run it manually from the GitHub website anytime
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run reputation scan and send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scan.py
